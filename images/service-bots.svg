<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="560" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4A5FD4"/>
      <stop offset="45%" stop-color="#5B6FE8"/>
      <stop offset="100%" stop-color="#6C63FF"/>
    </linearGradient>
    <linearGradient id="bg-overlay" x1="0" y1="0" x2="560" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6584" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="bot-shadow" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1A1A5E" flood-opacity="0.35"/>
    </filter>
    <filter id="bubble-shadow" x="-6%" y="-6%" width="112%" height="118%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#1A1A5E" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="560" height="200" fill="url(#bg)"/>
  <rect width="560" height="200" fill="url(#bg-overlay)"/>

  <!-- decorative dots -->
  <circle cx="48" cy="36" r="2" fill="#fff" opacity="0.15"/>
  <circle cx="72" cy="58" r="1.5" fill="#fff" opacity="0.12"/>
  <circle cx="510" cy="42" r="2" fill="#fff" opacity="0.14"/>
  <circle cx="488" cy="68" r="1.5" fill="#fff" opacity="0.1"/>
  <circle cx="280" cy="24" r="2.5" fill="#fff" opacity="0.08"/>

  <!-- motion lines left -->
  <path d="M30 70c8-4 16-4 24 0M24 90c10-5 20-5 30 0M32 110c8-4 16-4 24 0M20 130c12-6 24-6 36 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.22"/>
  <!-- motion lines right -->
  <path d="M500 60c-8-4-16-4-24 0M506 82c-10-5-20-5-30 0M498 104c-8-4-16-4-24 0M512 126c-12-6-24-6-36 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.22"/>

  <!-- signal waves -->
  <path d="M108 48c4-4 8-4 12 0M104 52c6-6 12-6 18 0" stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>
  <path d="M440 44c-4-4-8-4-12 0M444 48c-6-6-12-6-18 0" stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>

  <!-- chat bubbles -->
  <g filter="url(#bubble-shadow)">
    <path d="M195 28h72a6 6 0 0 1 6 6v22a6 6 0 0 1-6 6h-38l-10 10v-10h-24a6 6 0 0 1-6-6V34a6 6 0 0 1 6-6z" fill="#F7F7FB" stroke="#2D3A8C" stroke-width="1.5"/>
    <rect x="205" y="38" width="52" height="3.5" rx="1.75" fill="#2D3A8C" opacity="0.55"/>
    <rect x="205" y="45" width="40" height="3" rx="1.5" fill="#2D3A8C" opacity="0.35"/>
    <rect x="205" y="51" width="46" height="3" rx="1.5" fill="#2D3A8C" opacity="0.25"/>
  </g>

  <g filter="url(#bubble-shadow)">
    <rect x="310" y="22" width="56" height="36" rx="8" fill="#F7F7FB" stroke="#2D3A8C" stroke-width="1.5"/>
    <circle cx="326" cy="40" r="8" fill="none" stroke="#4A5FD4" stroke-width="1.5"/>
    <path d="M326 48v5" stroke="#4A5FD4" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="340" y="36" width="18" height="2.5" rx="1.25" fill="#2D3A8C" opacity="0.3"/>
    <rect x="340" y="42" width="14" height="2.5" rx="1.25" fill="#2D3A8C" opacity="0.2"/>
  </g>

  <g filter="url(#bubble-shadow)">
    <ellipse cx="400" cy="52" rx="22" ry="18" fill="#F7F7FB" stroke="#2D3A8C" stroke-width="1.5"/>
    <circle cx="400" cy="48" r="7" fill="none" stroke="#4A5FD4" stroke-width="1.5"/>
    <path d="M396 56c2 3 6 3 8 0" stroke="#4A5FD4" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  </g>

  <g filter="url(#bubble-shadow)">
    <rect x="230" y="100" width="100" height="32" rx="8" fill="#F7F7FB" stroke="#2D3A8C" stroke-width="1.5"/>
    <circle cx="248" cy="116" r="3" fill="#4A5FD4"/>
    <circle cx="258" cy="116" r="3" fill="#4A5FD4"/>
    <circle cx="268" cy="116" r="3" fill="#4A5FD4"/>
    <rect x="280" y="112" width="40" height="2.5" rx="1.25" fill="#2D3A8C" opacity="0.2"/>
    <rect x="280" y="118" width="30" height="2.5" rx="1.25" fill="#2D3A8C" opacity="0.15"/>
  </g>

  <g filter="url(#bubble-shadow)">
    <path d="M148 118h48a5 5 0 0 1 5 5v14a5 5 0 0 1-5 5h-20l-8 8v-8h-20a5 5 0 0 1-5-5v-14a5 5 0 0 1 5-5z" fill="#F7F7FB" stroke="#2D3A8C" stroke-width="1.5"/>
    <rect x="156" y="126" width="32" height="2.5" rx="1.25" fill="#2D3A8C" opacity="0.4"/>
    <rect x="156" y="132" width="24" height="2.5" rx="1.25" fill="#2D3A8C" opacity="0.28"/>
  </g>

  <!-- floating symbols -->
  <g opacity="0.75">
    <path d="M175 82v14M168 89h14" stroke="#FF6584" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M365 88c0-4 3.5-7 7.5-7s7.5 3 7.5 7v8c0 4-3.5 7-7.5 7s-7.5-3-7.5-7v-8z" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="372.5" cy="84" r="2" fill="#fff"/>
  </g>

  <!-- telegram paper plane -->
  <g filter="url(#bubble-shadow)" transform="translate(460, 100)">
    <circle cx="0" cy="0" r="22" fill="#F7F7FB" stroke="#2D3A8C" stroke-width="1.5"/>
    <path d="M-10 0 L10 -6 L4 0 L10 6 Z" fill="#4A5FD4"/>
    <path d="M-10 0 L4 0 L10 6 L-2 2 Z" fill="#6C63FF" opacity="0.7"/>
  </g>

  <!-- left robot -->
  <g filter="url(#bot-shadow)">
    <ellipse cx="108" cy="168" rx="38" ry="10" fill="#2D3A8C" opacity="0.25"/>
    <path d="M72 130 L108 108 L144 130 L144 158 L108 180 L72 158 Z" fill="#F7F7FB" stroke="#2D3A8C" stroke-width="2" stroke-linejoin="round"/>
    <path d="M82 132 L108 116 L134 132 L134 152 L108 168 L82 152 Z" fill="#5B6FE8" opacity="0.85"/>
    <circle cx="96" cy="142" r="5" fill="#fff"/>
    <circle cx="120" cy="142" r="5" fill="#fff"/>
    <circle cx="97" cy="143" r="2" fill="#2D3A8C"/>
    <circle cx="121" cy="143" r="2" fill="#2D3A8C"/>
    <path d="M96 152 Q108 160 120 152" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/>
    <line x1="108" y1="108" x2="108" y2="96" stroke="#2D3A8C" stroke-width="2" stroke-linecap="round"/>
    <circle cx="108" cy="92" r="6" fill="#FF6584" stroke="#2D3A8C" stroke-width="1.5"/>
    <path d="M108 92c-6-4-12-4-18 0M108 92c6-4 12-4 18 0" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    <path d="M76 148l3-3 3 3-3 3z M132 148l3-3 3 3-3 3z" fill="#5B6FE8" opacity="0.6"/>
    <path d="M96 168 L108 186 L120 168" fill="#2D3A8C" opacity="0.8"/>
    <path d="M100 174 L108 186 L116 174" fill="#4A5FD4" opacity="0.6"/>
  </g>

  <!-- right robot -->
  <g filter="url(#bot-shadow)">
    <ellipse cx="452" cy="168" rx="38" ry="10" fill="#2D3A8C" opacity="0.25"/>
    <path d="M416 130 L452 108 L488 130 L488 158 L452 180 L416 158 Z" fill="#F7F7FB" stroke="#2D3A8C" stroke-width="2" stroke-linejoin="round"/>
    <path d="M426 132 L452 116 L478 132 L478 152 L452 168 L426 152 Z" fill="#5B6FE8" opacity="0.85"/>
    <circle cx="440" cy="142" r="5" fill="#fff"/>
    <circle cx="464" cy="142" r="5" fill="#fff"/>
    <circle cx="441" cy="143" r="2" fill="#2D3A8C"/>
    <circle cx="465" cy="143" r="2" fill="#2D3A8C"/>
    <ellipse cx="452" cy="154" rx="5" ry="4" fill="#fff"/>
    <line x1="452" y1="108" x2="452" y2="96" stroke="#2D3A8C" stroke-width="2" stroke-linecap="round"/>
    <circle cx="452" cy="92" r="6" fill="#6C63FF" stroke="#2D3A8C" stroke-width="1.5"/>
    <path d="M452 92c-6-4-12-4-18 0M452 92c6-4 12-4 18 0" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    <path d="M420 148l3-3 3 3-3 3z M476 148l3-3 3 3-3 3z" fill="#5B6FE8" opacity="0.6"/>
    <path d="M440 168 L452 186 L464 168" fill="#2D3A8C" opacity="0.8"/>
    <path d="M444 174 L452 186 L460 174" fill="#4A5FD4" opacity="0.6"/>
  </g>

  <!-- connecting chat line -->
  <path d="M146 140 Q230 120 310 130 Q370 138 416 140" stroke="#fff" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.2" fill="none"/>
</svg>
